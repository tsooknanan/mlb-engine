<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strikepoint</title>
    <style>
        :root {
            /* Dark Mode Minimalist Palette */
            --bg-color: #0b0d10;          /* Deepest black/gray for main background */
            --card-bg: #13151a;           /* Slightly lighter for the main dashboard */
            --card-alt: #1a1c23;          /* For headers and summary bar */
            --text-main: #f1f5f9;         /* Crisp off-white */
            --text-muted: #8b949e;        /* Professional slate gray */
            --border: #252830;            /* Very subtle divider lines */
            --green: #10b981;             /* Vibrant emerald green for profit/units */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 3rem 2rem;
            -webkit-font-smoothing: antialiased; /* Makes text super crisp on dark backgrounds */
            -moz-osx-font-smoothing: grayscale;
        }
        .container { 
            max-width: 1050px; /* Slightly narrower for a tighter, cleaner look */
            margin: 0 auto; 
        }
        .header { 
            text-align: center; 
            margin-bottom: 4rem; 
        }
        .header h1 { 
            margin: 0; 
            font-size: 2.5rem; 
            color: var(--text-main); 
            font-weight: 700;
            letter-spacing: -1.2px; /* Tight, modern title tracking */
        }
        .header p { 
            margin: 8px 0 0 0; 
            color: var(--text-muted); 
            font-size: 1rem; 
            letter-spacing: 0.5px;
        }
        
        .loading-state {
            text-align: center;
            padding: 5rem 2rem;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .dashboard {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); /* Soft, deep shadow */
            overflow: hidden;
        }
        .summary-bar {
            background: var(--card-alt);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            color: var(--text-main);
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
        }
        th, td { 
            padding: 1.2rem 2rem; 
            border-bottom: 1px solid var(--border); 
        }
        th { 
            background: var(--card-alt); 
            font-weight: 600; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 1.5px; /* Wide tracking for modern column headers */
        }
        /* Remove the bottom border from the very last row so it looks clean */
        tr:last-child td { border-bottom: none; }
        
        .positive { color: var(--green); font-weight: 600; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Strikepoint</h1>
        <p>Mathematical Edge & Kelly Value Projections</p>
    </div>

    <div id="loading" class="loading-state">
        Synchronizing Data & Running 10,000 Monte Carlo Simulations...
    </div>

    <div class="dashboard hidden" id="dashboard">
        <div class="summary-bar" id="summary-bar">
            </div>
        <table>
            <thead>
                <tr>
                    <th>Matchup</th>
                    <th>Model Pick</th>
                    <th>Win Prob</th>
                    <th>Vegas Line</th>
                    <th>Wager (Units)</th>
                    <th>Proj. Return</th>
                </tr>
            </thead>
            <tbody id="results-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // ==========================================
    // 🛑 PASTE YOUR GOOGLE SHEET CSV LINK HERE
    // ==========================================
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQdoSh23OcrlgtA2xN-6cMmg6VHSHVn-VFL14SmQzaceuM6JES6m0oBLjdpoRcaanpdiN8z8KW4BWwz/pub?output=csv";
    
    // User Settings (Locked for public view)
    const KELLY_MULTIPLIER = 0.05;

    // --- DICTIONARIES & CONSTANTS ---
    const TEAM_MAP = {
        'Arizona Diamondbacks': 'ARI', 'Atlanta Braves': 'ATL', 'Baltimore Orioles': 'BAL',
        'Boston Red Sox': 'BOS', 'Chicago Cubs': 'CHC', 'Chicago White Sox': 'CHW',
        'Cincinnati Reds': 'CIN', 'Cleveland Guardians': 'CLE', 'Colorado Rockies': 'COL',
        'Detroit Tigers': 'DET', 'Houston Astros': 'HOU', 'Kansas City Royals': 'KCR',
        'Los Angeles Angels': 'LAA', 'Los Angeles Dodgers': 'LAD', 'Miami Marlins': 'MIA',
        'Milwaukee Brewers': 'MIL', 'Minnesota Twins': 'MIN', 'New York Mets': 'NYM',
        'New York Yankees': 'NYY', 'Oakland Athletics': 'OAK', 'Philadelphia Phillies': 'PHI',
        'Pittsburgh Pirates': 'PIT', 'San Diego Padres': 'SDP', 'San Francisco Giants': 'SFG',
        'Seattle Mariners': 'SEA', 'St. Louis Cardinals': 'STL', 'Tampa Bay Rays': 'TBR',
        'Texas Rangers': 'TEX', 'Toronto Blue Jays': 'TOR', 'Washington Nationals': 'WSN'
    };

    const PARK_FACTORS = {
        'Colorado Rockies': 1.14, 'Cincinnati Reds': 1.12, 'Boston Red Sox': 1.08,
        'Texas Rangers': 1.05, 'Atlanta Braves': 1.03, 'Kansas City Royals': 1.03,
        'Philadelphia Phillies': 1.02, 'Los Angeles Dodgers': 1.01, 'New York Yankees': 1.01, 
        'Chicago White Sox': 1.01, 'Arizona Diamondbacks': 1.00, 'Houston Astros': 1.00, 
        'Toronto Blue Jays': 1.00, 'Washington Nationals': 0.99, 'Chicago Cubs': 0.99, 
        'Milwaukee Brewers': 0.99, 'Minnesota Twins': 0.99, 'Baltimore Orioles': 0.98,
        'Pittsburgh Pirates': 0.98, 'Los Angeles Angels': 0.98, 'Miami Marlins': 0.97,
        'St. Louis Cardinals': 0.97, 'Tampa Bay Rays': 0.97, 'San Francisco Giants': 0.96,
        'Detroit Tigers': 0.96, 'Oakland Athletics': 0.95, 'New York Mets': 0.95,
        'Cleveland Guardians': 0.94, 'San Diego Padres': 0.92, 'Seattle Mariners': 0.91
    };

    let globalResults = [];

    // --- MATH ENGINE ---
    function randomGauss(mean, stdev) {
        let u = 1 - Math.random(); let v = Math.random();
        let z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        return z * stdev + mean;
    }

    function calculateKelly(p_win, odds, multiplier) {
        let p = p_win / 100.0;
        let b = odds > 0 ? (odds / 100.0) : (100.0 / Math.abs(odds));
        let edge = (p * b) - (1 - p);
        if (edge <= 0) return 0.0;
        return Math.min(parseFloat(((edge / b) * multiplier * 100).toFixed(2)), 2.5);
    }

    function getDecimalOdds(american_odds) {
        if (american_odds > 0) return parseFloat(((american_odds / 100.0) + 1).toFixed(2));
        return parseFloat(((100.0 / Math.abs(american_odds)) + 1).toFixed(2));
    }

    // --- API FETCHERS ---
    async function fetchJson(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error('API Error');
        return await response.json();
    }

    async function getSheetOdds() {
        if(SHEET_CSV_URL === "PASTE_YOUR_LINK_HERE") return {};
        try {
            const response = await fetch(SHEET_CSV_URL);
            const csvText = await response.text();
            const lines = csvText.split('\n');
            let oddsMap = {};
            for (let i = 1; i < lines.length; i++) {
                if(!lines[i].trim()) continue;
                let parts = lines[i].split(',');
                if (parts.length >= 2) {
                    let team = parts[0].trim().toUpperCase();
                    let odds = parseInt(parts[1].trim());
                    oddsMap[team] = isNaN(odds) ? 0 : odds;
                }
            }
            return oddsMap;
        } catch (e) {
            console.error("Could not fetch Google Sheet:", e);
            return {};
        }
    }

    async function getTodaysSchedule() {
        const today = new Date().toISOString().split('T')[0]; 
        const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=probablePitcher`;
        try {
            const data = await fetchJson(url);
            if (!data.dates || data.dates.length === 0) return [];
            return data.dates[0].games.map(game => ({
                away_name: game.teams.away.team.name, away_id: game.teams.away.team.id,
                away_pitcher_id: game.teams.away.probablePitcher ? game.teams.away.probablePitcher.id : null,
                home_name: game.teams.home.team.name, home_id: game.teams.home.team.id,
                home_pitcher_id: game.teams.home.probablePitcher ? game.teams.home.probablePitcher.id : null,
            }));
        } catch (e) { return []; }
    }

    async function getTeamHitting(teamId) {
        const year = new Date().getFullYear();
        const url = `https://statsapi.mlb.com/api/v1/teams/${teamId}/stats?group=hitting&stats=season&season=${year}`;
        try { return parseFloat((await fetchJson(url)).stats[0].splits[0].stat.ops); } 
        catch (e) { return 0.720; }
    }

    async function getPitchingStats(pitcherId, isBullpen = false) {
        if (!pitcherId && !isBullpen) return { whip: 1.30, k9: 8.5 };
        const year = new Date().getFullYear();
        const endpoint = isBullpen ? `teams/${pitcherId}` : `people/${pitcherId}`;
        const url = `https://statsapi.mlb.com/api/v1/${endpoint}/stats?stats=season&group=pitching&season=${year}`;
        try {
            const stats = (await fetchJson(url)).stats[0].splits[0].stat;
            return { whip: parseFloat(stats.whip || 1.30), k9: parseFloat(stats.strikeoutsPer9Inn || 8.5) };
        } catch (e) { return { whip: 1.30, k9: 8.5 }; }
    }

    // --- MONTE CARLO ---
    function simulateGame(a_off, b_off, a_starter, b_starter, a_bullpen, b_bullpen, home_team_name) {
        const factor = PARK_FACTORS[home_team_name] || 1.00;
        const getPFactor = (p) => (p.whip / 1.30 * 0.7) + (8.5 / Math.max(p.k9, 1.0) * 0.3);
        const a_pitching = (getPFactor(a_starter) * 0.6) + (getPFactor(a_bullpen) * 0.4);
        const b_pitching = (getPFactor(b_starter) * 0.6) + (getPFactor(b_bullpen) * 0.4);
        const a_exp = (4.5 * factor) * (a_off / 0.720) * b_pitching;
        const b_exp = (4.5 * factor) * (b_off / 0.720) * a_pitching;
        
        let a_s = Math.max(0, Math.round(randomGauss(a_exp, 3.2)));
        let b_s = Math.max(0, Math.round(randomGauss(b_exp, 3.2)));
        while (a_s === b_s) { a_s += Math.random() > 0.5 ? 1 : 0; b_s += Math.random() > 0.5 ? 1 : 0; }
        return a_s > b_s ? 'A' : 'B';
    }

    // --- MAIN AUTO-RUNNER ---
    async function runEngine() {
        const games = await getTodaysSchedule();
        if (games.length === 0) {
            document.getElementById('loading').innerText = "No games scheduled for today.";
            return;
        }

        // Pull the odds from your secret Google Sheet!
        const oddsData = await getSheetOdds();

        globalResults = [];

        for (let g of games) {
            const [a_off, b_off, a_starter, b_starter, a_bullpen, b_bullpen] = await Promise.all([
                getTeamHitting(g.away_id), getTeamHitting(g.home_id),
                getPitchingStats(g.away_pitcher_id), getPitchingStats(g.home_pitcher_id),
                getPitchingStats(g.away_id, true), getPitchingStats(g.home_id, true)
            ]);

            let a_wins = 0;
            for (let i = 0; i < 10000; i++) {
                if (simulateGame(a_off, b_off, a_starter, b_starter, a_bullpen, b_bullpen, g.home_name) === 'A') a_wins++;
            }

            let a_p = (a_wins / 10000) * 100;
            let h_p = (1 - (a_wins / 10000)) * 100;
            let fav_n = a_p > h_p ? g.away_name : g.home_name;
            let fav_code = TEAM_MAP[fav_n] || fav_n;
            let fav_p = a_p > h_p ? a_p : h_p;

            // Automatically check your Google Sheet for the odds of the favored team
            let vegasOdds = oddsData[fav_code] || 0;
            
            let wager = 0;
            let return_val = 0;
            if (vegasOdds !== 0) {
                wager = calculateKelly(fav_p, vegasOdds, KELLY_MULTIPLIER);
                return_val = wager > 0 ? wager * getDecimalOdds(vegasOdds) : 0;
            }

            globalResults.push({
                away: TEAM_MAP[g.away_name] || g.away_name,
                home: TEAM_MAP[g.home_name] || g.home_name,
                fav: fav_code,
                fav_p: fav_p.toFixed(1),
                odds: vegasOdds,
                wager: wager,
                return_val: return_val
            });
        }

        document.getElementById('loading').classList.add('hidden');
        renderTable();
        document.getElementById('dashboard').classList.remove('hidden');
    }

    function renderTable() {
        const tbody = document.getElementById('results-body');
        let totalWager = 0, totalReturn = 0, activeGames = 0, oddsCount = 0;

        // Sort results so games with active wagers show up at the top
        globalResults.sort((a, b) => b.wager - a.wager);

        globalResults.forEach(res => {
            // Count how many games actually have odds entered from the sheet
            if (res.odds !== 0) oddsCount++;

            // ONLY execute if the wager is greater than 0
            if(res.wager > 0) {
                totalWager += res.wager;
                totalReturn += res.return_val;
                activeGames++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${res.away} @ ${res.home}</td>
                    <td><strong>${res.fav}</strong></td>
                    <td>${res.fav_p}%</td>
                    <td>${res.odds > 0 ? '+' + res.odds : res.odds}</td>
                    <td class="positive">${res.wager.toFixed(2)}</td>
                    <td class="positive">${res.return_val.toFixed(2)}</td>
                `;
                tbody.appendChild(tr);
            }
        });

        const summaryBar = document.getElementById('summary-bar');
        
        // Accurately report what is happening under the hood
        if (oddsCount === 0) {
            summaryBar.innerHTML = `<span style="color: var(--text-muted);">Awaiting Vegas lines from Google Sheets...</span>`;
        } else if (oddsCount > 0 && activeGames === 0) {
            summaryBar.innerHTML = `<span style="color: var(--text-muted);">Odds loaded for ${oddsCount} games. No profitable edge found. Model passes.</span>`;
        } else {
            let profit = totalReturn - totalWager;
            summaryBar.innerHTML = `
                <span>Total Wager: <strong>${totalWager.toFixed(2)} units</strong> on <strong>${activeGames} games</strong>.</span>
                <span class="positive">Proj. Profit: +${profit.toFixed(2)}</span>
            `;
        }
    }

        const summaryBar = document.getElementById('summary-bar');
        if (activeGames === 0) {
            summaryBar.innerHTML = `<span style="color: var(--text-muted);">Awaiting Vegas lines for today's model picks.</span>`;
        } else {
            let profit = totalReturn - totalWager;
            summaryBar.innerHTML = `
                <span>Total Wager: <strong>${totalWager.toFixed(2)} units</strong> on <strong>${activeGames} games</strong>.</span>
                <span class="positive">Proj. Profit: +${profit.toFixed(2)} u</span>
            `;
        }
    }

    // Start the engine as soon as the page loads!
    window.onload = runEngine;
</script>
</body>
</html>
